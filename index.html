<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>ميدي فلو · بوابة العيادة الذكية</title>
    <meta name="description" content="احجز مواعيدك وتابع علاجك مع عيادتك الرقمية — MediFlow" />
    <meta name="application-name" content="MediFlow" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#0e7490" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c4a6e" media="(prefers-color-scheme: dark)" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />

    <!-- Apple / iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MediFlow" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/icon-512.png" />

    <!-- Open Graph / sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="MediFlow — بوابة المرضى" />
    <meta property="og:description" content="احجز مواعيدك مع عيادتك بسهولة" />
    <meta property="og:image"       content="%BASE_URL%icons/icon-512.png" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#0e7490" />
    <meta name="msapplication-TileImage" content="%BASE_URL%icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker for Patient Portal PWA -->
    <script>
      if ('serviceWorker' in navigator && !navigator.userAgent.includes('Electron')) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('%BASE_URL%sw.js', { scope: '%BASE_URL%' })
            .catch(function () { /* SW registration optional — app works without it */ });
        });
      }
    </script>
  </body>
</html>
